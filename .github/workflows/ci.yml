name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Ruby
        uses: ruby/setup-ruby@3551d3fbd4d3e346fa3979147a136f7ebaf8755b  # v1.314.0
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "24"

      - name: Install dependencies
        run: |
          gem install bundler -v 2.3.27
          bundle _2.3.27_ install

      - name: Build site
        run: bundle exec jekyll build

      - name: Run JS tests
        run: node --test tests/*.test.js

      - name: Validate tag normalization
        run: node scripts/check-tags.js