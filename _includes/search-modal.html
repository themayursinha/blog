<div class="site-search-modal" data-component="site-search" aria-hidden="true" hidden>
  <div class="site-search-backdrop" data-search-close></div>
  <div class="site-search-dialog" role="dialog" aria-modal="true" aria-labelledby="site-search-title" tabindex="-1">
    <div class="site-search-header">
      <svg class="site-search-icon" aria-hidden="true" viewBox="0 0 20 20" focusable="false">
        <path fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" d="M8.5 3a5.5 5.5 0 1 1-3.41 9.84l-3.7 3.7a1 1 0 0 1-1.42-1.42l3.7-3.7A5.5 5.5 0 0 1 8.5 3Zm0 2a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7Z"/>
      </svg>
      <label for="site-search-input" class="visually-hidden">Search the site</label>
      <input
        id="site-search-input"
        class="site-search-input"
        type="search"
        name="q"
        placeholder="Search posts, pages, projects…"
        aria-label="Search the site"
        aria-controls="site-search-results"
        aria-describedby="site-search-status"
        autocomplete="off"
        spellcheck="false"
      >
      <span class="site-search-hint" id="site-search-title">SEARCH</span>
      <button type="button" class="site-search-close" data-search-close aria-label="Close search (Esc)">×</button>
    </div>

    <p id="site-search-status" class="site-search-status" role="status" aria-live="polite">
      <span id="site-search-loading" class="site-search-loading" hidden>Loading index…</span>
      <span id="site-search-meta" class="site-search-meta"></span>
    </p>

    <ol id="site-search-results" class="site-search-results" aria-label="Search results" hidden></ol>

    <div id="site-search-empty" class="site-search-empty" hidden>
      <p class="site-search-empty-text">Type to search posts, architecture notes, and projects.</p>
      <p class="site-search-hint-row">
        <span>Try:</span>
        <button type="button" class="site-search-suggest" data-q="MCP">MCP</button>
        <button type="button" class="site-search-suggest" data-q="agent">agent</button>
        <button type="button" class="site-search-suggest" data-q="kubernetes">kubernetes</button>
        <button type="button" class="site-search-suggest" data-q="sovereign">sovereign</button>
      </p>
    </div>

    <footer class="site-search-footer">
      <span><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
      <span><kbd>↵</kbd> open</span>
      <span><kbd>esc</kbd> close</span>
    </footer>
  </div>
</div>
