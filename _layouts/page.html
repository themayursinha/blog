---
layout: base
---

<article class="prose">
  {% unless page.hide-page-title %}
    <header class="page-header">
      <h1>{{ page.title }}</h1>
      {% if page.subtitle %}
        <p class="page-subtitle">{{ page.subtitle }}</p>
      {% endif %}
    </header>
  {% endunless %}
  {{ content }}
</article>
