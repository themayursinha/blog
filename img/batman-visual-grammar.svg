<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 820" width="1140" height="820" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="bv-title bv-desc">
  <title id="bv-title">Two visual grammars</title>
  <desc id="bv-desc">Nolan's deep focus keeps the world sharp at every distance — the audience is a spectator. Reeves and Fraser use shallow depth of field so only the protagonist is sharp — the audience inhabits the character.</desc>

  <defs>
    <linearGradient id="bv-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0f120f"/>
    </linearGradient>
  </defs>

  <!-- Editorial card frame -->
  <rect width="1140" height="820" rx="24" fill="url(#bv-bg)"/>
  <rect x="24" y="24" width="1092" height="772" rx="18" fill="none" stroke="#293029" stroke-width="1.5"/>

  <!-- Title block -->
  <text x="68" y="80" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="28" font-weight="700">Two Visual Grammars</text>
  <text x="68" y="108" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="15">How depth of field changes who the camera is for.</text>
  <line x1="68" y1="132" x2="1072" y2="132" stroke="#293029" stroke-width="1"/>

  <!-- === Nolan (top) === -->
  <g transform="translate(68, 152)">
    <rect width="1004" height="36" rx="8" fill="#0f1622" stroke="#5fa8ff" stroke-width="1" stroke-opacity="0.6"/>
    <text x="20" y="24" fill="#5fa8ff" font-family="'IBM Plex Mono', monospace" font-size="11" letter-spacing="1.5">NOLAN</text>
    <text x="100" y="24" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="600">The Dark Knight (2005–2012)</text>
    <text x="984" y="24" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="10" text-anchor="end">DEEP FOCUS · WIDE LENSES</text>
  </g>

  <!-- Nolan frame illustration -->
  <g transform="translate(68, 200)">
    <rect width="480" height="240" rx="10" fill="#0a0a0a" stroke="#5fa8ff" stroke-width="1" stroke-opacity="0.4"/>
    <!-- Sharp buildings -->
    <rect x="24" y="48" width="44" height="120" fill="#1a2438" stroke="#3c5278" stroke-width="1"/>
    <rect x="80" y="28" width="52" height="140" fill="#1a2438" stroke="#3c5278" stroke-width="1"/>
    <rect x="148" y="56" width="38" height="112" fill="#1a2438" stroke="#3c5278" stroke-width="1"/>
    <rect x="200" y="36" width="48" height="132" fill="#1a2438" stroke="#3c5278" stroke-width="1"/>
    <rect x="264" y="64" width="42" height="104" fill="#1a2438" stroke="#3c5278" stroke-width="1"/>
    <rect x="320" y="30" width="58" height="138" fill="#1a2438" stroke="#3c5278" stroke-width="1"/>
    <rect x="392" y="50" width="58" height="118" fill="#1a2438" stroke="#3c5278" stroke-width="1"/>
    <!-- Foreground character (sharp) -->
    <circle cx="240" cy="160" r="22" fill="#0a0a0a" stroke="#5fa8ff" stroke-width="1.5"/>
    <rect x="222" y="182" width="36" height="48" fill="#0a0a0a" stroke="#5fa8ff" stroke-width="1.5"/>
    <text x="24" y="220" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="10" letter-spacing="1.5">EVERYTHING SHARP</text>
    <text x="456" y="220" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="10" text-anchor="end">SPECTATOR POV</text>
  </g>

  <!-- Nolan traits -->
  <g transform="translate(568, 200)">
    <rect width="504" height="240" rx="10" fill="#0a0a0a" stroke="#293029" stroke-width="1"/>
    <text x="24" y="32" fill="#5fa8ff" font-family="'IBM Plex Mono', monospace" font-size="11" letter-spacing="1.5">VISUAL GRAMMAR</text>
    <text x="24" y="68" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="15" font-weight="600">Wide-angle lenses</text>
    <text x="24" y="92" fill="#858c85" font-family="'Space Grotesk', sans-serif" font-size="13">anchored, classical coverage</text>
    <text x="24" y="128" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="15" font-weight="600">Deep focus throughout</text>
    <text x="24" y="152" fill="#858c85" font-family="'Space Grotesk', sans-serif" font-size="13">all characters sharp at every distance</text>
    <text x="24" y="188" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="15" font-weight="600">Operatic scale</text>
    <text x="24" y="212" fill="#858c85" font-family="'Space Grotesk', sans-serif" font-size="13">the audience is the spectator at a distance</text>
  </g>

  <!-- Divider -->
  <line x1="68" y1="464" x2="1072" y2="464" stroke="#3c493e" stroke-width="1"/>
  <text x="570" y="484" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="10" text-anchor="middle" letter-spacing="2">SHIFT IN GRAMMAR</text>

  <!-- === Reeves (bottom) === -->
  <g transform="translate(68, 504)">
    <rect width="1004" height="36" rx="8" fill="#1a1610" stroke="#febc2e" stroke-width="1" stroke-opacity="0.6"/>
    <text x="20" y="24" fill="#febc2e" font-family="'IBM Plex Mono', monospace" font-size="11" letter-spacing="1.5">REEVES</text>
    <text x="100" y="24" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="600">The Batman (2022)</text>
    <text x="984" y="24" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="10" text-anchor="end">SHALLOW FOCUS · CLOSE-UP</text>
  </g>

  <!-- Reeves frame illustration -->
  <g transform="translate(68, 552)">
    <rect width="480" height="240" rx="10" fill="#0a0a0a" stroke="#febc2e" stroke-width="1" stroke-opacity="0.4"/>
    <!-- Blurred buildings (warm tones) -->
    <rect x="24" y="48" width="44" height="120" fill="#3a3020" stroke="#5a4a30" stroke-width="1" opacity="0.5"/>
    <rect x="80" y="28" width="52" height="140" fill="#3a3020" stroke="#5a4a30" stroke-width="1" opacity="0.5"/>
    <rect x="148" y="56" width="38" height="112" fill="#3a3020" stroke="#5a4a30" stroke-width="1" opacity="0.5"/>
    <rect x="200" y="36" width="48" height="132" fill="#3a3020" stroke="#5a4a30" stroke-width="1" opacity="0.5"/>
    <rect x="264" y="64" width="42" height="104" fill="#3a3020" stroke="#5a4a30" stroke-width="1" opacity="0.5"/>
    <rect x="320" y="30" width="58" height="138" fill="#3a3020" stroke="#5a4a30" stroke-width="1" opacity="0.5"/>
    <rect x="392" y="50" width="58" height="118" fill="#3a3020" stroke="#5a4a30" stroke-width="1" opacity="0.5"/>
    <!-- Blurred secondary characters -->
    <g opacity="0.35">
      <circle cx="100" cy="160" r="14" fill="#0a0a0a" stroke="#5a4a30" stroke-width="1"/>
      <rect x="88" y="174" width="24" height="40" fill="#0a0a0a" stroke="#5a4a30" stroke-width="1"/>
    </g>
    <g opacity="0.3">
      <circle cx="400" cy="170" r="12" fill="#0a0a0a" stroke="#5a4a30" stroke-width="1"/>
      <rect x="390" y="182" width="20" height="32" fill="#0a0a0a" stroke="#5a4a30" stroke-width="1"/>
    </g>
    <!-- Sharp cowl + eye -->
    <path d="M 215 158 L 215 116 Q 215 74 265 74 Q 315 74 315 116 L 315 158 Z" fill="#0a0a0a" stroke="#febc2e" stroke-width="2.5"/>
    <circle cx="265" cy="108" r="22" fill="#0a0a0a" stroke="#febc2e" stroke-width="1.5"/>
    <circle cx="265" cy="108" r="10" fill="#febc2e"/>
    <text x="24" y="220" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="10" letter-spacing="1.5">ONE EYE SHARP</text>
    <text x="456" y="220" fill="#febc2e" font-family="'IBM Plex Mono', monospace" font-size="10" text-anchor="end" font-weight="600">PASSENGER POV</text>
  </g>

  <!-- Reeves traits -->
  <g transform="translate(568, 552)">
    <rect width="504" height="240" rx="10" fill="#0a0a0a" stroke="#293029" stroke-width="1"/>
    <text x="24" y="32" fill="#febc2e" font-family="'IBM Plex Mono', monospace" font-size="11" letter-spacing="1.5">VISUAL GRAMMAR</text>
    <text x="24" y="68" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="15" font-weight="600">Shallow focus</text>
    <text x="24" y="92" fill="#858c85" font-family="'Space Grotesk', sans-serif" font-size="13">only a sliver of the frame is in focus</text>
    <text x="24" y="128" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="15" font-weight="600">POV shots &amp; close-ups</text>
    <text x="24" y="152" fill="#858c85" font-family="'Space Grotesk', sans-serif" font-size="13">the audience inhabits the character</text>
    <text x="24" y="188" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="15" font-weight="600">Noir framing</text>
    <text x="24" y="212" fill="#858c85" font-family="'Space Grotesk', sans-serif" font-size="13">Taxi Driver, Chinatown, French Connection</text>
  </g>
</svg>
