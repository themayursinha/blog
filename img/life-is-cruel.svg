<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 560" width="1140" height="560" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="lc-title lc-desc">
  <title id="lc-title">Life is cruel</title>
  <desc id="lc-desc">The universe is indifferent with no cosmic scorekeeper. The only light is the justice, medicine, and compassion we create.</desc>

  <defs>
    <linearGradient id="lc-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0f120f"/>
    </linearGradient>
  </defs>

  <!-- Editorial card frame -->
  <rect width="1140" height="560" rx="24" fill="url(#lc-bg)"/>
  <rect x="24" y="24" width="1092" height="512" rx="18" fill="none" stroke="#293029" stroke-width="1.5"/>

  <!-- Title block -->
  <text x="68" y="80" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="28" font-weight="700">Life Is Cruel</text>
  <text x="68" y="108" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="15">The universe is indifferent. Justice is ours to build.</text>
  <line x1="68" y1="132" x2="1072" y2="132" stroke="#293029" stroke-width="1"/>

  <!-- Stars: indifferent universe (static dots, left + right clusters) -->
  <g fill="#aeb6ae">
    <circle cx="180" cy="190" r="2"/>
    <circle cx="250" cy="160" r="1.5"/>
    <circle cx="150" cy="250" r="1.5"/>
    <circle cx="310" cy="210" r="2"/>
    <circle cx="210" cy="290" r="1.5"/>
    <circle cx="280" cy="270" r="2"/>
    <circle cx="120" cy="220" r="1.5"/>
    <circle cx="340" cy="180" r="1.5"/>
    <circle cx="820" cy="190" r="2"/>
    <circle cx="890" cy="160" r="1.5"/>
    <circle cx="790" cy="250" r="1.5"/>
    <circle cx="950" cy="210" r="2"/>
    <circle cx="850" cy="290" r="1.5"/>
    <circle cx="920" cy="270" r="2"/>
    <circle cx="760" cy="220" r="1.5"/>
    <circle cx="980" cy="180" r="1.5"/>
  </g>

  <!-- Star cluster labels -->
  <text x="230" y="340" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="12" text-anchor="middle">no cosmic scorekeeper</text>
  <text x="870" y="340" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="12" text-anchor="middle">no built-in meaning</text>

  <!-- Planet / earth (center) -->
  <circle cx="570" cy="340" r="90" fill="#0d120d" stroke="#3c493e" stroke-width="1.5"/>
  <path d="M 500 320 Q 540 300 580 320 Q 620 340 660 320" fill="none" stroke="#1f2a1f" stroke-width="2"/>
  <path d="M 510 360 Q 550 380 590 360 Q 630 340 650 370" fill="none" stroke="#1f2a1f" stroke-width="2"/>

  <!-- Human lights on the planet (green, focal) -->
  <circle cx="540" cy="310" r="3.5" fill="#00ff41"/>
  <circle cx="570" cy="330" r="3.5" fill="#00ff41"/>
  <circle cx="600" cy="320" r="3.5" fill="#00ff41"/>
  <circle cx="550" cy="350" r="3.5" fill="#00ff41"/>
  <circle cx="590" cy="360" r="3.5" fill="#00ff41"/>

  <!-- Human light label -->
  <text x="570" y="458" fill="#00ff41" font-family="'IBM Plex Mono', monospace" font-size="13" text-anchor="middle" font-weight="600">only human light</text>
  <text x="570" y="478" fill="#aeb6ae" font-family="'IBM Plex Mono', monospace" font-size="12" text-anchor="middle">medicine · law · compassion</text>

  <!-- Bottom note -->
  <text x="570" y="520" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="13" text-anchor="middle">Suffering is real. The question is what we build in the gap between is and ought.</text>
</svg>
