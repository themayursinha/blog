<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" width="720" height="360" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="cir-title cir-desc">
  <title id="cir-title">Series circuit diagram</title>
  <desc id="cir-desc">Three resistors in series with a 12 V battery. The diagram forces you to be explicit about what is connected to what.</desc>

  <defs>
    <style>
      @keyframes flow { to { stroke-dashoffset: -45; } }
      .current-path { stroke-dasharray: 30 15; animation: flow 0.9s linear infinite; }
      @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
    </style>
    <linearGradient id="cir-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0f120f"/>
    </linearGradient>
  </defs>

  <!-- Editorial card frame -->
  <rect width="720" height="360" rx="24" fill="url(#cir-bg)"/>
  <rect x="24" y="24" width="672" height="312" rx="18" fill="none" stroke="#293029" stroke-width="1.5"/>

  <!-- Title -->
  <text x="48" y="68" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="20" font-weight="700">Series Circuit</text>
  <text x="48" y="92" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="13">Three resistors, one 12 V battery. Be explicit about what connects to what.</text>
  <line x1="48" y1="112" x2="672" y2="112" stroke="#293029" stroke-width="1"/>

  <!-- Battery (left) -->
  <line x1="110" y1="160" x2="110" y2="260" stroke="#e0e0e0" stroke-width="3"/>
  <line x1="120" y1="160" x2="120" y2="198" stroke="#e0e0e0" stroke-width="5"/>
  <line x1="130" y1="160" x2="130" y2="260" stroke="#e0e0e0" stroke-width="3"/>
  <line x1="120" y1="222" x2="120" y2="260" stroke="#e0e0e0" stroke-width="5"/>
  <text x="93" y="288" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="14">12 V</text>

  <!-- Top wire from battery -->
  <line x1="110" y1="160" x2="160" y2="160" stroke="#e0e0e0" stroke-width="3"/>

  <!-- Resistor R1 = 3 ohm (zigzag) -->
  <polyline points="160,160 166,145 178,175 190,145 202,175 208,160" fill="none" stroke="#e0e0e0" stroke-width="3"/>
  <text x="184" y="138" fill="#00ff41" font-family="'IBM Plex Mono', monospace" font-size="13" text-anchor="middle">3 Ω</text>

  <!-- Wire R1→R2 -->
  <line x1="208" y1="160" x2="290" y2="160" stroke="#e0e0e0" stroke-width="3"/>

  <!-- Resistor R2 = 4 ohm -->
  <polyline points="290,160 296,145 308,175 320,145 332,175 338,160" fill="none" stroke="#e0e0e0" stroke-width="3"/>
  <text x="314" y="138" fill="#00ff41" font-family="'IBM Plex Mono', monospace" font-size="13" text-anchor="middle">4 Ω</text>

  <!-- Wire R2→R3 -->
  <line x1="338" y1="160" x2="420" y2="160" stroke="#e0e0e0" stroke-width="3"/>

  <!-- Resistor R3 = x ohm -->
  <polyline points="420,160 426,145 438,175 450,145 462,175 468,160" fill="none" stroke="#e0e0e0" stroke-width="3"/>
  <text x="444" y="138" fill="#00ff41" font-family="'IBM Plex Mono', monospace" font-size="13" text-anchor="middle">x Ω</text>

  <!-- Wire to right + return -->
  <line x1="468" y1="160" x2="540" y2="160" stroke="#e0e0e0" stroke-width="3"/>
  <line x1="540" y1="160" x2="540" y2="260" stroke="#e0e0e0" stroke-width="3"/>
  <line x1="130" y1="260" x2="540" y2="260" stroke="#e0e0e0" stroke-width="3"/>

  <!-- Animated current flow (functional) -->
  <path d="M 110 160 L 160 160 L 166 145 L 178 175 L 190 145 L 202 175 L 208 160 L 290 160 L 296 145 L 308 175 L 320 145 L 332 175 L 338 160 L 420 160 L 426 145 L 438 175 L 450 145 L 462 175 L 468 160 L 540 160 L 540 260 L 130 260"
        fill="none" stroke="#00ff41" stroke-width="2" stroke-linecap="round"
        class="current-path" opacity="0.65"/>

  <!-- Current direction arrow + label -->
  <polygon points="320,253 335,260 320,267" fill="#e0e0e0"/>
  <text x="328" y="290" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="12" text-anchor="middle">I = 1 A</text>

  <!-- Node dots -->
  <circle cx="110" cy="160" r="4" fill="#00ff41"/>
  <circle cx="130" cy="160" r="4" fill="#00ff41"/>
  <circle cx="540" cy="160" r="4" fill="#00ff41"/>
  <circle cx="540" cy="260" r="4" fill="#00ff41"/>
  <circle cx="130" cy="260" r="4" fill="#00ff41"/>
  <circle cx="110" cy="260" r="4" fill="#00ff41"/>
</svg>
