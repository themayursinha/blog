<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 760" width="1140" height="760" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="sv-title sv-desc">
  <title id="sv-title">Group decision methods compared</title>
  <desc id="sv-desc">Debates, voting, hierarchy, and committees each optimize for something other than truth. The Socratic dialogue is the only method that treats consensus as a requirement rather than a convenience.</desc>

  <defs>
    <linearGradient id="sv-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0f120f"/>
    </linearGradient>
  </defs>

  <!-- Editorial card frame -->
  <rect width="1140" height="760" rx="24" fill="url(#sv-bg)"/>
  <rect x="24" y="24" width="1092" height="712" rx="18" fill="none" stroke="#293029" stroke-width="1.5"/>

  <!-- Title block -->
  <text x="68" y="80" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="28" font-weight="700">Group Decision Methods Compared</text>
  <text x="68" y="108" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="15">Each method optimizes for a different goal. Only one treats truth as non-negotiable.</text>
  <line x1="68" y1="132" x2="1072" y2="132" stroke="#293029" stroke-width="1"/>

  <!-- Column headers -->
  <text x="140" y="164" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle" letter-spacing="2">METHOD</text>
  <text x="440" y="164" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle" letter-spacing="2">HOW IT DECIDES</text>
  <text x="760" y="164" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle" letter-spacing="2">WHAT IT PRODUCES</text>
  <text x="980" y="164" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle" letter-spacing="2">TRUTH?</text>
  <line x1="68" y1="176" x2="1072" y2="176" stroke="#293029" stroke-width="1"/>

  <!-- Row 1: Debate -->
  <g transform="translate(68, 196)">
    <rect width="144" height="56" rx="8" fill="#1a1210" stroke="#8a2a20" stroke-width="1.2"/>
    <text x="72" y="35" fill="#ff5f57" font-family="'IBM Plex Mono', monospace" font-size="13" text-anchor="middle" font-weight="600">DEBATE</text>
  </g>
  <text x="240" y="224" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="14">Adversarial argument. One side wins.</text>
  <text x="600" y="224" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="14">A winner, not necessarily truth.</text>
  <text x="980" y="228" fill="#8a2a20" font-family="'IBM Plex Mono', monospace" font-size="13" text-anchor="middle" font-weight="600">Rarely</text>
  <line x1="68" y1="268" x2="1072" y2="268" stroke="#1a1f1a" stroke-width="1"/>

  <!-- Row 2: Voting -->
  <g transform="translate(68, 288)">
    <rect width="144" height="56" rx="8" fill="#1a1210" stroke="#8a2a20" stroke-width="1.2"/>
    <text x="72" y="35" fill="#ff5f57" font-family="'IBM Plex Mono', monospace" font-size="13" text-anchor="middle" font-weight="600">VOTING</text>
  </g>
  <text x="240" y="316" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="14">Majority count. Minority overruled.</text>
  <text x="600" y="316" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="14">A majority preference.</text>
  <text x="980" y="320" fill="#8a2a20" font-family="'IBM Plex Mono', monospace" font-size="13" text-anchor="middle" font-weight="600">No</text>
  <line x1="68" y1="360" x2="1072" y2="360" stroke="#1a1f1a" stroke-width="1"/>

  <!-- Row 3: Hierarchy -->
  <g transform="translate(68, 380)">
    <rect width="144" height="56" rx="8" fill="#1a1210" stroke="#8a2a20" stroke-width="1.2"/>
    <text x="72" y="35" fill="#ff5f57" font-family="'IBM Plex Mono', monospace" font-size="13" text-anchor="middle" font-weight="600">HIERARCHY</text>
  </g>
  <text x="240" y="408" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="14">Authority decides. Subordinates execute.</text>
  <text x="600" y="408" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="14">Orders executed without discussion.</text>
  <text x="980" y="412" fill="#8a2a20" font-family="'IBM Plex Mono', monospace" font-size="13" text-anchor="middle" font-weight="600">Incidental</text>
  <line x1="68" y1="452" x2="1072" y2="452" stroke="#1a1f1a" stroke-width="1"/>

  <!-- Row 4: Committee -->
  <g transform="translate(68, 472)">
    <rect width="144" height="56" rx="8" fill="#1a1210" stroke="#8a2a20" stroke-width="1.2"/>
    <text x="72" y="35" fill="#ff5f57" font-family="'IBM Plex Mono', monospace" font-size="13" text-anchor="middle" font-weight="600">COMMITTEE</text>
  </g>
  <text x="240" y="500" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="14">Factional negotiation. Compromise required.</text>
  <text x="600" y="500" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="14">A compromise nobody believes.</text>
  <text x="980" y="504" fill="#8a2a20" font-family="'IBM Plex Mono', monospace" font-size="13" text-anchor="middle" font-weight="600">No</text>
  <line x1="68" y1="544" x2="1072" y2="544" stroke="#00ff41" stroke-width="1" opacity="0.4"/>

  <!-- Row 5: Socratic (highlighted, focal green) -->
  <g transform="translate(68, 564)">
    <rect width="144" height="56" rx="8" fill="#0a1a0d" stroke="#00ff41" stroke-width="2"/>
    <text x="72" y="35" fill="#00ff41" font-family="'IBM Plex Mono', monospace" font-size="13" text-anchor="middle" font-weight="700">SOCRATIC</text>
  </g>
  <text x="240" y="592" fill="#00ff41" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="600">Consensus. Every objection resolved.</text>
  <text x="600" y="592" fill="#00ff41" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="600">A definition everyone holds.</text>
  <text x="980" y="596" fill="#00ff41" font-family="'IBM Plex Mono', monospace" font-size="13" text-anchor="middle" font-weight="700">THE GOAL</text>
  <line x1="68" y1="636" x2="1072" y2="636" stroke="#00ff41" stroke-width="1" opacity="0.4"/>

  <!-- Bottom: what each method optimizes for -->
  <text x="68" y="668" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="11" letter-spacing="2">WHAT EACH METHOD ACTUALLY OPTIMIZES FOR</text>
  <g transform="translate(68, 684)">
    <rect width="232" height="44" rx="8" fill="#0f120f" stroke="#3c493e"/>
    <text x="116" y="20" fill="#ff5f57" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle" font-weight="600">DEBATE</text>
    <text x="116" y="36" fill="#858c85" font-family="'Space Grotesk', sans-serif" font-size="12" text-anchor="middle">Rhetorical skill</text>
  </g>
  <g transform="translate(316, 684)">
    <rect width="232" height="44" rx="8" fill="#0f120f" stroke="#3c493e"/>
    <text x="116" y="20" fill="#ff5f57" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle" font-weight="600">VOTING</text>
    <text x="116" y="36" fill="#858c85" font-family="'Space Grotesk', sans-serif" font-size="12" text-anchor="middle">Popularity &amp; speed</text>
  </g>
  <g transform="translate(564, 684)">
    <rect width="232" height="44" rx="8" fill="#0f120f" stroke="#3c493e"/>
    <text x="116" y="20" fill="#ff5f57" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle" font-weight="600">COMMITTEE</text>
    <text x="116" y="36" fill="#858c85" font-family="'Space Grotesk', sans-serif" font-size="12" text-anchor="middle">Political viability</text>
  </g>
  <g transform="translate(812, 684)">
    <rect width="260" height="44" rx="10" fill="#0a1a0d" stroke="#00ff41" stroke-width="2"/>
    <text x="130" y="20" fill="#00ff41" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle" font-weight="700">SOCRATIC</text>
    <text x="130" y="36" fill="#00ff41" font-family="'Space Grotesk', sans-serif" font-size="12" text-anchor="middle" font-weight="600">Universal truth</text>
  </g>
</svg>
