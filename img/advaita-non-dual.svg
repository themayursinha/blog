<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" width="1000" height="620" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="an-title an-desc">
  <title id="an-title">The non-dual structure</title>
  <desc id="an-desc">Body, mind, and ego are experienced as concentric layers, yet all arise in and as the one conscious center. Atman equals Brahman.</desc>

  <defs>
    <linearGradient id="an-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0f120f"/>
    </linearGradient>
    <radialGradient id="an-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#00ff41" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Editorial card frame -->
  <rect width="1000" height="620" rx="24" fill="url(#an-bg)"/>
  <rect x="24" y="24" width="952" height="572" rx="18" fill="none" stroke="#293029" stroke-width="1.5"/>

  <!-- Title block -->
  <text x="500" y="80" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="26" font-weight="700" text-anchor="middle">The Non-Dual Structure</text>
  <text x="500" y="108" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="14" text-anchor="middle">One reality, apparently layered into self and world by the power of Maya.</text>
  <line x1="68" y1="132" x2="932" y2="132" stroke="#293029" stroke-width="1"/>

  <!-- Concentric rings (centered at 500, 330) -->
  <circle cx="500" cy="330" r="170" fill="none" stroke="#3c493e" stroke-width="1" stroke-dasharray="6 6"/>
  <text x="500" y="148" fill="#aeb6ae" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle" letter-spacing="2">WORLD OF MULTIPLICITY</text>

  <circle cx="500" cy="330" r="130" fill="none" stroke="#3c493e" stroke-width="1.5"/>
  <text x="500" y="188" fill="#aeb6ae" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle" letter-spacing="2">BODY</text>

  <circle cx="500" cy="330" r="92" fill="none" stroke="#3c493e" stroke-width="1.5"/>
  <text x="500" y="228" fill="#aeb6ae" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle" letter-spacing="2">MIND</text>

  <circle cx="500" cy="330" r="56" fill="none" stroke="#3c493e" stroke-width="1.5"/>
  <text x="500" y="268" fill="#aeb6ae" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle" letter-spacing="2">EGO / I-MAKER</text>

  <!-- Atman/Brahman core (focal green) -->
  <circle cx="500" cy="330" r="40" fill="url(#an-glow)"/>
  <circle cx="500" cy="330" r="32" fill="none" stroke="#00ff41" stroke-width="2"/>
  <text x="500" y="326" fill="#00ff41" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="700" text-anchor="middle">ATMAN</text>
  <text x="500" y="346" fill="#00ff41" font-family="'Space Grotesk', sans-serif" font-size="11" text-anchor="middle">= BRAHMAN</text>

  <!-- Maya annotation (right side) -->
  <g transform="translate(780, 330)">
    <rect x="-60" y="-20" width="120" height="40" rx="8" fill="#0f120f" stroke="#3c493e"/>
    <text x="0" y="-2" fill="#00ff41" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle" font-weight="600">MAYA</text>
    <text x="0" y="14" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="10" text-anchor="middle">the apparent</text>
  </g>
  <line x1="720" y1="330" x2="600" y2="330" stroke="#3c493e" stroke-width="1"/>

  <!-- Identity equation (bottom) -->
  <g transform="translate(500, 480)">
    <rect x="-200" y="-22" width="400" height="44" rx="8" fill="#0a1a0d" stroke="#00ff41" stroke-width="1"/>
    <text x="0" y="6" fill="#00ff41" font-family="'Space Grotesk', sans-serif" font-size="16" font-weight="700" text-anchor="middle">TAT TVAM ASI · THAT THOU ART</text>
  </g>

  <!-- Side annotations -->
  <text x="160" y="320" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle">labels dissolve</text>
  <text x="160" y="338" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle">inward</text>
  <line x1="200" y1="330" x2="280" y2="330" stroke="#3c493e" stroke-width="1"/>

  <!-- Bottom note -->
  <text x="500" y="556" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="13" text-anchor="middle">The rings are experienced as separate layers, yet all arise in and as the one center.</text>
</svg>
