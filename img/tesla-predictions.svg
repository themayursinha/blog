<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 760" width="1140" height="760" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="tp-title tp-desc">
  <title id="tp-title">Tesla's 1930 predictions scorecard</title>
  <desc id="tp-desc">Tesla's predictions sorted by what happened: foundations that became real, niches that survived marginally, and predictions that did not survive contact with physics.</desc>

  <defs>
    <linearGradient id="tp-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0f120f"/>
    </linearGradient>
  </defs>

  <!-- Editorial card frame -->
  <rect width="1140" height="760" rx="24" fill="url(#tp-bg)"/>
  <rect x="24" y="24" width="1092" height="712" rx="18" fill="none" stroke="#293029" stroke-width="1.5"/>

  <!-- Title block -->
  <text x="68" y="80" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="28" font-weight="700">The Scorecard</text>
  <text x="68" y="108" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="15">What Tesla got right, what he half-got, and what did not survive contact with physics.</text>
  <line x1="68" y1="132" x2="1072" y2="132" stroke="#293029" stroke-width="1"/>

  <!-- Column headers -->
  <text x="220" y="164" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle" letter-spacing="2">PREDICTION (1930)</text>
  <text x="560" y="164" fill="#00ff41" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle" letter-spacing="2">WHAT HAPPENED</text>
  <text x="920" y="164" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle" letter-spacing="2">VERDICT</text>
  <line x1="68" y1="176" x2="1072" y2="176" stroke="#293029" stroke-width="1"/>

  <!-- === FOUNDATIONS (green) === -->
  <g transform="translate(68, 192)">
    <rect width="1004" height="36" rx="8" fill="#0a1a0d" stroke="#00ff41" stroke-width="1" stroke-opacity="0.5"/>
    <text x="24" y="24" fill="#00ff41" font-family="'IBM Plex Mono', monospace" font-size="11" letter-spacing="1.5">FOUNDATIONS</text>
  </g>

  <!-- Foundation 1: Solar/Wind -->
  <text x="80" y="258" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="15" font-weight="600">Energy from the sun</text>
  <text x="80" y="278" fill="#858c85" font-family="'Space Grotesk', sans-serif" font-size="12">"All energy on Earth is solar energy"</text>
  <g transform="translate(400, 240)">
    <rect width="320" height="56" rx="10" fill="#0a1a0d" stroke="#00ff41" stroke-width="1" stroke-opacity="0.6"/>
    <text x="24" y="26" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="600">Solar &amp; wind power</text>
    <text x="24" y="46" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="12">cheapest new electricity globally</text>
  </g>
  <g transform="translate(820, 240)">
    <rect width="240" height="56" rx="10" fill="#0a1a0d" stroke="#00ff41" stroke-width="1.5"/>
    <text x="120" y="34" fill="#00ff41" font-family="'IBM Plex Mono', monospace" font-size="13" text-anchor="middle" font-weight="700">FOUNDATION</text>
  </g>

  <!-- Foundation 2: Wireless transmission -->
  <text x="80" y="338" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="15" font-weight="600">Wireless transmission</text>
  <text x="80" y="358" fill="#858c85" font-family="'Space Grotesk', sans-serif" font-size="12">"resonant frequencies, no wires"</text>
  <g transform="translate(400, 320)">
    <rect width="320" height="56" rx="10" fill="#0a1a0d" stroke="#00ff41" stroke-width="1" stroke-opacity="0.6"/>
    <text x="24" y="26" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="600">Radio, Wi-Fi, cellular</text>
    <text x="24" y="46" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="12">global wireless infrastructure</text>
  </g>
  <g transform="translate(820, 320)">
    <rect width="240" height="56" rx="10" fill="#0a1a0d" stroke="#00ff41" stroke-width="1.5"/>
    <text x="120" y="34" fill="#00ff41" font-family="'IBM Plex Mono', monospace" font-size="13" text-anchor="middle" font-weight="700">FOUNDATION</text>
  </g>

  <!-- Foundation 3: Medical electricity -->
  <text x="80" y="418" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="15" font-weight="600">Medical electricity</text>
  <text x="80" y="438" fill="#858c85" font-family="'Space Grotesk', sans-serif" font-size="12">"transmit impulses to cure disease"</text>
  <g transform="translate(400, 400)">
    <rect width="320" height="56" rx="10" fill="#0a1a0d" stroke="#00ff41" stroke-width="1" stroke-opacity="0.6"/>
    <text x="24" y="26" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="600">TENS, pacemakers, DBS</text>
    <text x="24" y="46" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="12">electrical medicine is real</text>
  </g>
  <g transform="translate(820, 400)">
    <rect width="240" height="56" rx="10" fill="#0a1a0d" stroke="#00ff41" stroke-width="1.5"/>
    <text x="120" y="34" fill="#00ff41" font-family="'IBM Plex Mono', monospace" font-size="13" text-anchor="middle" font-weight="700">FOUNDATION</text>
  </g>

  <!-- === NICHES (yellow) === -->
  <g transform="translate(68, 480)">
    <rect width="1004" height="36" rx="8" fill="#1a1610" stroke="#febc2e" stroke-width="1" stroke-opacity="0.5"/>
    <text x="24" y="24" fill="#febc2e" font-family="'IBM Plex Mono', monospace" font-size="11" letter-spacing="1.5">NICHES</text>
  </g>

  <!-- Niche 1: Artificial tide -->
  <text x="80" y="546" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="15" font-weight="600">"Artificial tide"</text>
  <text x="80" y="566" fill="#858c85" font-family="'Space Grotesk', sans-serif" font-size="12">extract power from ocean motion</text>
  <g transform="translate(400, 528)">
    <rect width="320" height="56" rx="10" fill="#1a1610" stroke="#febc2e" stroke-width="1" stroke-opacity="0.5"/>
    <text x="24" y="26" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="600">Tidal power exists</text>
    <text x="24" y="46" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="12">marginal economics, few sites</text>
  </g>
  <g transform="translate(820, 528)">
    <rect width="240" height="56" rx="10" fill="#1a1610" stroke="#febc2e" stroke-width="1.5"/>
    <text x="120" y="34" fill="#febc2e" font-family="'IBM Plex Mono', monospace" font-size="13" text-anchor="middle" font-weight="700">NICHE</text>
  </g>

  <!-- Niche 2: Wireless power to cities -->
  <text x="80" y="626" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="15" font-weight="600">Wireless power to cities</text>
  <text x="80" y="646" fill="#858c85" font-family="'Space Grotesk', sans-serif" font-size="12">no transmission lines needed</text>
  <g transform="translate(400, 608)">
    <rect width="320" height="56" rx="10" fill="#1a1610" stroke="#febc2e" stroke-width="1" stroke-opacity="0.5"/>
    <text x="24" y="26" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="600">Wireless charging pads</text>
    <text x="24" y="46" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="12">RFID, niche consumer devices</text>
  </g>
  <g transform="translate(820, 608)">
    <rect width="240" height="56" rx="10" fill="#1a1610" stroke="#febc2e" stroke-width="1.5"/>
    <text x="120" y="34" fill="#febc2e" font-family="'IBM Plex Mono', monospace" font-size="13" text-anchor="middle" font-weight="700">NICHE</text>
  </g>

  <!-- === DID NOT SURVIVE (red) === -->
  <g transform="translate(68, 680)">
    <rect width="1004" height="36" rx="8" fill="#1a1210" stroke="#8a2a20" stroke-width="1" stroke-opacity="0.5"/>
    <text x="24" y="24" fill="#ff5f57" font-family="'IBM Plex Mono', monospace" font-size="11" letter-spacing="1.5">DID NOT SURVIVE</text>
  </g>
  <text x="80" y="714" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="600">Cosmic ray generator — energy density too low to harvest economically</text>
  <g transform="translate(820, 700)">
    <rect width="240" height="32" rx="8" fill="#1a1210" stroke="#8a2a20" stroke-width="1.5"/>
    <text x="120" y="22" fill="#ff5f57" font-family="'IBM Plex Mono', monospace" font-size="12" text-anchor="middle" font-weight="700">WRONG</text>
  </g>
</svg>
