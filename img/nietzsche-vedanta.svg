<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 560" width="1140" height="560" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="nv-title nv-desc">
  <title id="nv-title">Nietzsche and Vedanta</title>
  <desc id="nv-desc">Both traditions transcend conventional dualities. One responds with self-creation, the other with self-realization. The convergence is metaphysical; the divergence is existential.</desc>

  <defs>
    <linearGradient id="nv-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0f120f"/>
    </linearGradient>
  </defs>

  <!-- Editorial card frame -->
  <rect width="1140" height="560" rx="24" fill="url(#nv-bg)"/>
  <rect x="24" y="24" width="1092" height="512" rx="18" fill="none" stroke="#293029" stroke-width="1.5"/>

  <!-- Title block -->
  <text x="68" y="80" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="28" font-weight="700">Nietzsche and Vedanta</text>
  <text x="68" y="108" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="15">Both transcend the given. One creates; the other realizes.</text>
  <line x1="68" y1="132" x2="1072" y2="132" stroke="#293029" stroke-width="1"/>

  <!-- Left circle: Nietzsche (red) -->
  <circle cx="420" cy="290" r="150" fill="#1a0a0a" stroke="#5a3a3a" stroke-width="1.5" opacity="0.55"/>
  <text x="420" y="188" fill="#ff5f57" font-family="'IBM Plex Mono', monospace" font-size="14" font-weight="600" text-anchor="middle">NIETZSCHE</text>
  <text x="420" y="210" fill="#aeb6ae" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle">beyond good and evil</text>
  <text x="420" y="340" fill="#aeb6ae" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle">will to power</text>
  <text x="420" y="360" fill="#aeb6ae" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle">self-creation</text>
  <text x="420" y="380" fill="#aeb6ae" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle">eternal recurrence</text>

  <!-- Right circle: Vedanta (green) -->
  <circle cx="720" cy="290" r="150" fill="#0a1a0d" stroke="#00ff41" stroke-width="1.5" opacity="0.55"/>
  <text x="720" y="188" fill="#00ff41" font-family="'IBM Plex Mono', monospace" font-size="14" font-weight="600" text-anchor="middle">VEDANTA</text>
  <text x="720" y="210" fill="#aeb6ae" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle">beyond all dualities</text>
  <text x="720" y="340" fill="#aeb6ae" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle">Brahman / Atman</text>
  <text x="720" y="360" fill="#aeb6ae" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle">self-realization</text>
  <text x="720" y="380" fill="#aeb6ae" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle">Maya / cyclical time</text>

  <!-- Overlap: shared -->
  <ellipse cx="570" cy="290" rx="62" ry="92" fill="#0a1a0d" stroke="#00ff41" stroke-width="1.5" opacity="0.85"/>
  <text x="570" y="274" fill="#00ff41" font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">SHARED</text>
  <text x="570" y="294" fill="#aeb6ae" font-family="'IBM Plex Mono', monospace" font-size="10" text-anchor="middle">illusion of</text>
  <text x="570" y="310" fill="#aeb6ae" font-family="'IBM Plex Mono', monospace" font-size="10" text-anchor="middle">conventional</text>
  <text x="570" y="326" fill="#aeb6ae" font-family="'IBM Plex Mono', monospace" font-size="10" text-anchor="middle">categories</text>

  <!-- Divergence boxes (bottom) -->
  <g transform="translate(220, 440)">
    <rect width="300" height="48" rx="8" fill="#1a0a0a" stroke="#5a3a3a" stroke-width="1"/>
    <text x="150" y="30" fill="#ff5f57" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="600" text-anchor="middle">RESPONSE: CREATE VALUES</text>
  </g>
  <g transform="translate(620, 440)">
    <rect width="300" height="48" rx="8" fill="#0a1a0d" stroke="#00ff41" stroke-width="1"/>
    <text x="150" y="30" fill="#00ff41" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="600" text-anchor="middle">RESPONSE: REALIZE TRUTH</text>
  </g>

  <!-- Bottom note -->
  <text x="570" y="520" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="13" text-anchor="middle">The convergence is metaphysical. The divergence is existential.</text>
</svg>
