<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 620" width="1140" height="620" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="cr-title cr-desc">
  <title id="cr-title">The verification era</title>
  <desc id="cr-desc">Humans shift from reviewing every line to defining intent and constraints; machines handle layered verification.</desc>

  <defs>
    <linearGradient id="cr-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0f120f"/>
    </linearGradient>
    <marker id="cr-arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#00ff41"/>
    </marker>
  </defs>

  <!-- Editorial card frame -->
  <rect width="1140" height="620" rx="24" fill="url(#cr-bg)"/>
  <rect x="24" y="24" width="1092" height="572" rx="18" fill="none" stroke="#293029" stroke-width="1.5"/>

  <!-- Title block -->
  <text x="68" y="80" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="28" font-weight="700">The Verification Era</text>
  <text x="68" y="108" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="15">Humans define intent. Machines handle ruthless verification.</text>
  <line x1="68" y1="132" x2="1072" y2="132" stroke="#293029" stroke-width="1"/>

  <!-- Left panel: old model -->
  <g transform="translate(68, 156)">
    <rect width="460" height="400" rx="14" fill="#0f120f" stroke="#5a3a3a" stroke-width="1.5"/>
    <text x="24" y="38" fill="#ff5f57" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="600" letter-spacing="1.2">OLD MODEL</text>
    <text x="24" y="66" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="12">human reviews every line</text>

    <!-- Large diff box -->
    <rect x="40" y="100" width="380" height="60" rx="10" fill="#1a0a0a" stroke="#5a3a3a" stroke-width="1.5"/>
    <text x="230" y="128" fill="#aeb6ae" font-family="'IBM Plex Mono', monospace" font-size="13" text-anchor="middle">large AI-generated diff</text>
    <text x="230" y="148" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle">unfamiliar patterns · subtle bugs</text>

    <!-- Human reviewer box -->
    <rect x="100" y="190" width="260" height="70" rx="10" fill="#1a0a0a" stroke="#5a3a3a" stroke-width="1.5"/>
    <text x="230" y="220" fill="#ff5f57" font-family="'IBM Plex Mono', monospace" font-size="13" text-anchor="middle" font-weight="600">HUMAN REVIEWER</text>
    <text x="230" y="242" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle">fatigued · context-switched</text>

    <text x="230" y="310" fill="#aeb6ae" font-family="'Space Grotesk', sans-serif" font-size="14" text-anchor="middle">bottleneck: 91% slower reviews</text>
    <text x="230" y="338" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="12" text-anchor="middle">rubber-stamp risk · burnout</text>
  </g>

  <!-- Arrow -->
  <path d="M 540 350 L 580 350" stroke="#00ff41" stroke-width="2.5" fill="none" marker-end="url(#cr-arrow)"/>

  <!-- Right panel: new model -->
  <g transform="translate(600, 156)">
    <rect width="472" height="400" rx="14" fill="#0a1a0d" stroke="#00ff41" stroke-width="1.5"/>
    <text x="24" y="38" fill="#00ff41" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="600" letter-spacing="1.2">NEW MODEL</text>
    <text x="24" y="66" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="12">human defines intent · machines verify</text>

    <!-- Intent & spec -->
    <rect x="32" y="92" width="408" height="48" rx="10" fill="#0f120f" stroke="#00ff41" stroke-width="1"/>
    <text x="236" y="122" fill="#00ff41" font-family="'Space Grotesk', sans-serif" font-size="15" font-weight="700" text-anchor="middle">Intent &amp; specification</text>

    <!-- Generated code -->
    <rect x="32" y="156" width="408" height="48" rx="10" fill="#0f120f" stroke="#3c493e"/>
    <text x="236" y="186" fill="#aeb6ae" font-family="'Space Grotesk', sans-serif" font-size="15" font-weight="600" text-anchor="middle">Generated code</text>

    <!-- Verification layers (3 across) -->
    <text x="236" y="232" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="11" letter-spacing="1.2" text-anchor="middle">LAYERED VERIFICATION</text>
    <rect x="32" y="244" width="128" height="56" rx="8" fill="#0f120f" stroke="#3c493e"/>
    <text x="96" y="268" fill="#aeb6ae" font-family="'Space Grotesk', sans-serif" font-size="14" text-anchor="middle" font-weight="600">Static</text>
    <text x="96" y="288" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle">analysis</text>
    <rect x="172" y="244" width="128" height="56" rx="8" fill="#0f120f" stroke="#3c493e"/>
    <text x="236" y="268" fill="#aeb6ae" font-family="'Space Grotesk', sans-serif" font-size="14" text-anchor="middle" font-weight="600">Tests</text>
    <text x="236" y="288" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle">executable</text>
    <rect x="312" y="244" width="128" height="56" rx="8" fill="#0f120f" stroke="#3c493e"/>
    <text x="376" y="268" fill="#aeb6ae" font-family="'Space Grotesk', sans-serif" font-size="14" text-anchor="middle" font-weight="600">Red team</text>
    <text x="376" y="288" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle">adversarial</text>

    <text x="236" y="340" fill="#aeb6ae" font-family="'Space Grotesk', sans-serif" font-size="14" text-anchor="middle">human reviews the spec</text>
    <text x="236" y="364" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="12" text-anchor="middle">machines review the code</text>
  </g>

  <!-- Bottom note -->
  <text x="540" y="584" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="13" text-anchor="middle">"Are we solving the right problem with the right constraints?"</text>
</svg>
