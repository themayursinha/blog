<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 620" width="1140" height="620" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="ve-title ve-desc">
  <title id="ve-title">Vibe coding vs. vibe engineering</title>
  <desc id="ve-desc">Vibe coding ships fast and accumulates debt. Vibe engineering adds constraints before generation so the output fits the system.</desc>

  <defs>
    <linearGradient id="ve-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0f120f"/>
    </linearGradient>
    <marker id="ve-arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#00ff41"/>
    </marker>
  </defs>

  <!-- Editorial card frame -->
  <rect width="1140" height="620" rx="24" fill="url(#ve-bg)"/>
  <rect x="24" y="24" width="1092" height="572" rx="18" fill="none" stroke="#293029" stroke-width="1.5"/>

  <!-- Title block -->
  <text x="68" y="80" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="28" font-weight="700">Vibe Engineering</text>
  <text x="68" y="108" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="15">The discipline behind AI-assisted production software.</text>
  <line x1="68" y1="132" x2="1072" y2="132" stroke="#293029" stroke-width="1"/>

  <!-- Left panel: vibe coding -->
  <g transform="translate(68, 156)">
    <rect width="460" height="400" rx="14" fill="#0f120f" stroke="#5a3a3a" stroke-width="1.5"/>
    <text x="24" y="38" fill="#ff5f57" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="600" letter-spacing="1.2">VIBE CODING</text>
    <text x="24" y="66" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="12">prompt → generate → ship</text>

    <!-- Code box -->
    <rect x="32" y="92" width="396" height="200" rx="10" fill="#1a0a0a" stroke="#5a3a3a" stroke-width="1"/>
    <text x="52" y="124" fill="#ff5f57" font-family="'IBM Plex Mono', monospace" font-size="13">// TODO: fix later</text>
    <text x="52" y="152" fill="#aeb6ae" font-family="'IBM Plex Mono', monospace" font-size="13">function doThing(data) {</text>
    <text x="52" y="180" fill="#aeb6ae" font-family="'IBM Plex Mono', monospace" font-size="13">  let x = AI(data);</text>
    <text x="52" y="208" fill="#aeb6ae" font-family="'IBM Plex Mono', monospace" font-size="13">  if (x) return x;</text>
    <text x="52" y="236" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="13">  // fallback ???</text>
    <text x="52" y="264" fill="#aeb6ae" font-family="'IBM Plex Mono', monospace" font-size="13">  return null;</text>
    <text x="52" y="284" fill="#aeb6ae" font-family="'IBM Plex Mono', monospace" font-size="13">}</text>

    <text x="230" y="328" fill="#aeb6ae" font-family="'Space Grotesk', sans-serif" font-size="14" text-anchor="middle">works until it doesn't</text>
    <text x="230" y="352" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="12" text-anchor="middle">velocity today, debt tomorrow</text>
  </g>

  <!-- Arrow -->
  <path d="M 540 350 L 580 350" stroke="#00ff41" stroke-width="2.5" fill="none" marker-end="url(#ve-arrow)"/>

  <!-- Right panel: vibe engineering -->
  <g transform="translate(600, 156)">
    <rect width="472" height="400" rx="14" fill="#0a1a0d" stroke="#00ff41" stroke-width="1.5"/>
    <text x="24" y="38" fill="#00ff41" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="600" letter-spacing="1.2">VIBE ENGINEERING</text>
    <text x="24" y="66" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="12">intent → spec → generate → verify</text>

    <!-- Step 1: Specification -->
    <rect x="32" y="92" width="408" height="68" rx="10" fill="#0f120f" stroke="#3c493e"/>
    <text x="48" y="120" fill="#00ff41" font-family="'Space Grotesk', sans-serif" font-size="16" font-weight="700">Specification</text>
    <text x="48" y="142" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="12">behavior · constraints · edge cases</text>

    <!-- Step 2: Tests first -->
    <rect x="32" y="174" width="408" height="68" rx="10" fill="#0f120f" stroke="#3c493e"/>
    <text x="48" y="202" fill="#00ff41" font-family="'Space Grotesk', sans-serif" font-size="16" font-weight="700">Tests first</text>
    <text x="48" y="224" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="12">executable expectations</text>

    <!-- Step 3: Generated code -->
    <rect x="32" y="256" width="408" height="68" rx="10" fill="#0f120f" stroke="#3c493e"/>
    <text x="48" y="284" fill="#00ff41" font-family="'Space Grotesk', sans-serif" font-size="16" font-weight="700">Generated code</text>
    <text x="48" y="306" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="12">within boundaries · accountable</text>

    <text x="236" y="352" fill="#aeb6ae" font-family="'Space Grotesk', sans-serif" font-size="14" text-anchor="middle">fits the system · secure · tested</text>
    <text x="236" y="376" fill="#00ff41" font-family="'IBM Plex Mono', monospace" font-size="12" text-anchor="middle">engineer becomes a curator of context</text>
  </g>

  <!-- Bottom note -->
  <text x="540" y="584" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="13" text-anchor="middle">Vibe engineering keeps the speed where it matters and adds the discipline where it counts.</text>
</svg>
