<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" font-family="'IBM Plex Mono', monospace">
  <defs>
    <marker id="arrow-dim" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#3c493e"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#00ff41"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0f120f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="220" rx="12" fill="url(#bg)"/>
  <rect x="8" y="8" width="784" height="204" rx="10" fill="none" stroke="#293029" stroke-width="1"/>

  <!-- Title -->
  <text x="24" y="30" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="13" font-weight="700">The evolution toward spec engineering</text>
  <text x="24" y="46" fill="#858c85" font-size="10">Each layer abstracts more. Each layer reduces what the human specifies.</text>

  <!-- === EVOLUTION CHAIN === -->
  <!-- 1. No-Code -->
  <rect x="30" y="75" width="70" height="40" rx="6" fill="#0f120f" stroke="#3c493e" stroke-width="1.2"/>
  <text x="65" y="93" fill="#858c85" font-size="10" font-weight="600" text-anchor="middle">No-Code</text>
  <text x="65" y="106" fill="#586058" font-size="7" text-anchor="middle">drag &amp; drop</text>

  <line x1="100" y1="95" x2="118" y2="95" stroke="#3c493e" stroke-width="1.5" marker-end="url(#arrow-dim)"/>

  <!-- 2. Low-Code -->
  <rect x="120" y="75" width="70" height="40" rx="6" fill="#0f120f" stroke="#3c493e" stroke-width="1.2"/>
  <text x="155" y="93" fill="#858c85" font-size="10" font-weight="600" text-anchor="middle">Low-Code</text>
  <text x="155" y="106" fill="#586058" font-size="7" text-anchor="middle">templates</text>

  <line x1="190" y1="95" x2="208" y2="95" stroke="#3c493e" stroke-width="1.5" marker-end="url(#arrow-dim)"/>

  <!-- 3. Prompt -->
  <rect x="210" y="70" width="80" height="50" rx="6" fill="#1a1208" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="250" y="90" fill="#f59e0b" font-size="10" font-weight="600" text-anchor="middle">Prompt Eng</text>
  <text x="250" y="105" fill="#92400e" font-size="7" text-anchor="middle">probabilistic</text>
  <text x="250" y="116" fill="#78350f" font-size="6" text-anchor="middle">"be careful"</text>

  <line x1="290" y1="95" x2="308" y2="95" stroke="#3c493e" stroke-width="1.5" marker-end="url(#arrow-dim)"/>

  <!-- 4. Loop -->
  <rect x="310" y="70" width="80" height="50" rx="6" fill="#1a1208" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="350" y="90" fill="#f59e0b" font-size="10" font-weight="600" text-anchor="middle">Loop Eng</text>
  <text x="350" y="105" fill="#92400e" font-size="7" text-anchor="middle">plan + execute</text>
  <text x="350" y="116" fill="#78350f" font-size="6" text-anchor="middle">iterative</text>

  <!-- Arrow to Spec Eng — glowing green -->
  <line x1="390" y1="95" x2="415" y2="95" stroke="#00ff41" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- 5. Spec Eng — hero -->
  <rect x="420" y="55" width="110" height="80" rx="8" fill="#0a1a0d" stroke="#00ff41" stroke-width="2" filter="url(#glow)"/>
  <text x="475" y="82" fill="#00ff41" font-size="12" font-weight="700" text-anchor="middle">Spec Eng</text>
  <text x="475" y="100" fill="#15803d" font-size="8" text-anchor="middle">deterministic</text>
  <text x="475" y="114" fill="#166534" font-size="7" text-anchor="middle">declarative YAML</text>
  <text x="475" y="128" fill="#166534" font-size="6" text-anchor="middle">runtime enforces</text>

  <line x1="530" y1="95" x2="555" y2="95" stroke="#00ff41" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- MCP Visor label -->
  <rect x="560" y="72" width="100" height="45" rx="6" fill="#0a1a0d" stroke="#00ff41" stroke-width="1.2"/>
  <text x="610" y="90" fill="#00ff41" font-size="10" font-weight="600" text-anchor="middle">MCP Visor</text>
  <text x="610" y="106" fill="#586058" font-size="7" text-anchor="middle">open source · MIT</text>

  <!-- === BOTTOM: Comparison === -->
  <line x1="80" y1="155" x2="720" y2="155" stroke="#293029" stroke-width="1"/>

  <!-- Left: prompt engineering failure -->
  <rect x="30" y="168" width="240" height="40" rx="5" fill="#1a0a0a" stroke="#7f1d1d" stroke-width="1"/>
  <text x="150" y="184" fill="#ef4444" font-size="9" font-weight="600" text-anchor="middle">✕ Prompt engineering for security</text>
  <text x="150" y="200" fill="#991b1b" font-size="7" text-anchor="middle">model can be persuaded · 0% prevention</text>

  <!-- Arrow -->
  <text x="310" y="192" fill="#858c85" font-size="12" font-weight="700" text-anchor="middle">→</text>

  <!-- Right: spec engineering -->
  <rect x="350" y="168" width="240" height="40" rx="5" fill="#0a1a0d" stroke="#00ff41" stroke-width="1"/>
  <text x="470" y="184" fill="#00ff41" font-size="9" font-weight="600" text-anchor="middle">✓ Spec engineering for security</text>
  <text x="470" y="200" fill="#166534" font-size="7" text-anchor="middle">deterministic · cannot be bypassed</text>

  <!-- Animated dots along green flows -->
  <circle cx="402" cy="95" r="2" fill="#00ff41" opacity="0.8">
    <animate attributeName="cx" from="402" to="402" dur="0s"/>
  </circle>
  <circle cx="410" cy="95" r="2" fill="#00ff41">
    <animate attributeName="opacity" values="1;0;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>