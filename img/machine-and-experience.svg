<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 560" width="1140" height="560" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="me-title me-desc">
  <title id="me-title">Man, machine, and mind</title>
  <desc id="me-desc">The same system can be described as mechanism from the third-person view and as awareness from the first-person view. Emergence is the bridge between them.</desc>

  <defs>
    <linearGradient id="me-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0f120f"/>
    </linearGradient>
  </defs>

  <!-- Editorial card frame -->
  <rect width="1140" height="560" rx="24" fill="url(#me-bg)"/>
  <rect x="24" y="24" width="1092" height="512" rx="18" fill="none" stroke="#293029" stroke-width="1.5"/>

  <!-- Title block -->
  <text x="68" y="80" fill="#e0e0e0" font-family="'Space Grotesk', sans-serif" font-size="28" font-weight="700">Man, Machine, and Mind</text>
  <text x="68" y="108" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="15">Two valid descriptions of the same system.</text>
  <line x1="68" y1="132" x2="1072" y2="132" stroke="#293029" stroke-width="1"/>

  <!-- Left panel: third-person / mechanism -->
  <g transform="translate(68, 156)">
    <rect width="400" height="360" rx="14" fill="#0f120f" stroke="#3c493e" stroke-width="1.5"/>
    <text x="24" y="38" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="600" letter-spacing="1.2">THIRD-PERSON VIEW</text>
    <text x="24" y="66" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="12">mechanism · cause · physics</text>

    <!-- Gear (static, no rotation) -->
    <g transform="translate(200, 160)">
      <circle cx="0" cy="0" r="48" fill="none" stroke="#5a6a5a" stroke-width="2"/>
      <circle cx="0" cy="0" r="34" fill="none" stroke="#5a6a5a" stroke-width="2"/>
      <circle cx="0" cy="0" r="12" fill="#0d120d" stroke="#5a6a5a" stroke-width="2"/>
      <line x1="0" y1="-48" x2="0" y2="48" stroke="#5a6a5a" stroke-width="2"/>
      <line x1="-48" y1="0" x2="48" y2="0" stroke="#5a6a5a" stroke-width="2"/>
      <line x1="-34" y1="-34" x2="34" y2="34" stroke="#5a6a5a" stroke-width="2"/>
      <line x1="-34" y1="34" x2="34" y2="-34" stroke="#5a6a5a" stroke-width="2"/>
    </g>

    <!-- Neuron network (static) -->
    <g transform="translate(200, 270)">
      <line x1="-64" y1="0" x2="64" y2="0" stroke="#2a3a2a" stroke-width="1.5"/>
      <line x1="-32" y1="-30" x2="32" y2="30" stroke="#2a3a2a" stroke-width="1.5"/>
      <line x1="-32" y1="30" x2="32" y2="-30" stroke="#2a3a2a" stroke-width="1.5"/>
      <circle cx="-64" cy="0" r="6" fill="#00ff41"/>
      <circle cx="-32" cy="-30" r="6" fill="#00ff41"/>
      <circle cx="-32" cy="30" r="6" fill="#00ff41"/>
      <circle cx="0" cy="0" r="8" fill="#00ff41"/>
      <circle cx="32" cy="-30" r="6" fill="#00ff41"/>
      <circle cx="32" cy="30" r="6" fill="#00ff41"/>
      <circle cx="64" cy="0" r="6" fill="#00ff41"/>
    </g>

    <text x="200" y="328" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="12" text-anchor="middle">laws + states + inputs → outputs</text>
  </g>

  <!-- Bridge: emergence -->
  <g transform="translate(570, 330)">
    <polygon points="-56,-32 56,-32 78,0 56,32 -56,32 -78,0" fill="#0a1a0d" stroke="#00ff41" stroke-width="2"/>
    <text x="0" y="6" fill="#00ff41" font-family="'Space Grotesk', sans-serif" font-size="15" font-weight="700" text-anchor="middle">EMERGENCE</text>
  </g>

  <!-- Right panel: first-person / experience -->
  <g transform="translate(672, 156)">
    <rect width="400" height="360" rx="14" fill="#0a1a0d" stroke="#00ff41" stroke-width="1.5"/>
    <text x="24" y="38" fill="#00ff41" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="600" letter-spacing="1.2">FIRST-PERSON VIEW</text>
    <text x="24" y="66" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="12">awareness · meaning · choice</text>

    <!-- Eye / awareness (static) -->
    <g transform="translate(200, 170)">
      <ellipse cx="0" cy="0" rx="60" ry="34" fill="none" stroke="#00ff41" stroke-width="2"/>
      <circle cx="0" cy="0" r="20" fill="#0a0a0a" stroke="#00ff41" stroke-width="2"/>
      <circle cx="0" cy="0" r="8" fill="#00ff41"/>
      <circle cx="-4" cy="-4" r="3" fill="#ffffff"/>
    </g>

    <!-- Experience labels -->
    <text x="200" y="262" fill="#aeb6ae" font-family="'Space Grotesk', sans-serif" font-size="14" text-anchor="middle">I see red.</text>
    <text x="200" y="284" fill="#aeb6ae" font-family="'Space Grotesk', sans-serif" font-size="14" text-anchor="middle">I choose.</text>
    <text x="200" y="306" fill="#aeb6ae" font-family="'Space Grotesk', sans-serif" font-size="14" text-anchor="middle">I suffer.</text>
    <text x="200" y="332" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="12" text-anchor="middle">not predictions from outside</text>
  </g>

  <!-- Bottom note -->
  <text x="540" y="528" fill="#858c85" font-family="'IBM Plex Mono', monospace" font-size="13" text-anchor="middle">The same system, described from two scales. Neither description dissolves the other.</text>
</svg>
